{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newspaper</title>
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400" rel="stylesheet">
  <link href="{% static 'css/base.css' %}" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a class="brand" href="{% url 'home' %}">Newspaper</a>
      <div class="nav-actions">
        {% if user.is_authenticated %}
          <a class="nav-link" href="{% url 'article_list' %}">Articles</a>
          <a class="button button-primary" href="{% url 'article_new' %}">+ New</a>
          <span class="username">{{ user.username }}</span>
          <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button class="button button-outline" type="submit">Log Out</button>
          </form>
        {% else %}
          <a class="button button-outline" href="{% url 'login' %}">Log In</a>
        {% endif %}
      </div>
    </nav>
  </header>

  <main class="page-shell">
    {% block content %}
    {% endblock content %}
  </main>
</body>
</html>
